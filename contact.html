<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Car Stereo Brochures</title>
<style>
:root{--bg:#f2f2f2;--card:#fff;--text:#333;--muted:#777;--border:#ccc;--soft:#eaeaea;--link:#1f789d;--button:#fff;--button-hover:#e9eef2}
body.dark-mode{--bg:#151515;--card:#242424;--text:#eee;--muted:#bbb;--border:#555;--soft:#333;--link:#7cc7e8;--button:#242424;--button-hover:#3a3a3a}
body{margin:0;padding:20px;background:var(--bg);font-family:Arial,sans-serif;color:var(--text)}
.container{max-width:800px;margin:auto}.header{text-align:center;margin-bottom:34px}.logo{max-width:320px;width:100%;height:auto}
.top-buttons{display:flex;justify-content:center;gap:10px;margin-top:18px}
.top-button{display:flex;align-items:center;justify-content:center;width:44px;min-width:44px;height:44px;padding:0;background:var(--button);color:var(--text);text-decoration:none;border:1px solid var(--border);border-radius:8px;font-size:26px;font-weight:900;font-family:Arial,sans-serif;line-height:44px;box-sizing:border-box;cursor:pointer}
.top-button:hover{background:var(--button-hover)}
.icon-back{position:relative;top:-1px;font-size:28px}.icon-home{position:relative;top:-2px;font-size:30px}.theme-icon{font-size:22px;font-weight:700}
.page-title{text-align:center;margin-bottom:10px;font-size:28px;font-weight:bold}
.intro{text-align:center;color:var(--muted);line-height:1.5;margin:0 auto 32px;max-width:700px}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;box-sizing:border-box}
.form-grid{display:grid;grid-template-columns:1fr;gap:18px}.form-field{display:flex;flex-direction:column;gap:7px}
label{font-weight:bold;font-size:15px}.required{color:#c94}
input,textarea{width:100%;min-height:44px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;font-family:Arial,sans-serif;box-sizing:border-box}
textarea{min-height:160px;padding:12px 14px;resize:vertical}
.action-row{display:flex;gap:12px;align-items:center;justify-content:flex-end;margin-top:24px;flex-wrap:wrap}
.submit-button,.secondary-button{display:flex;align-items:center;justify-content:center;min-width:160px;height:44px;padding:0 18px;background:var(--button);border:1px solid var(--border);color:var(--text);border-radius:8px;text-decoration:none;font-size:16px;font-weight:bold;font-family:Arial,sans-serif;cursor:pointer;box-sizing:border-box}
.submit-button:hover,.secondary-button:hover{background:var(--button-hover)}
.submit-button{background:#1f789d;color:#fff;border:none}.submit-button:hover{background:#17627f}
.status-box{display:none;margin-top:20px;padding:14px 16px;border-radius:8px;border:1px solid var(--border);background:var(--soft);line-height:1.5}
.status-box.success{display:block;border-color:#4f8f5f}.status-box.error{display:block;border-color:#b85c5c}.disabled{opacity:.55;pointer-events:none}
@media(max-width:800px){body{padding:14px}.form-card{padding:18px}.page-title{font-size:24px}.action-row{justify-content:stretch}.submit-button,.secondary-button{width:100%}}
</style>
<script data-goatcounter="https://oyvindhaugland.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <img class="logo" id="siteLogo" src="CarStereoBrochures2.png" alt="Car Stereo Brochures">
    <div class="top-buttons">
      <a class="top-button" href="index.html" title="Back"><span class="icon-back">←</span></a>
      <a class="top-button" href="index.html" title="Home"><span class="icon-home">⌂</span></a>
      <button type="button" class="top-button" onclick="toggleTheme()" id="themeToggle" title="Toggle light/dark mode"><span class="theme-icon">◐</span></button>
    </div>
  </div>
  <div class="page-title">Contact</div>
  <div class="intro">Send a message to the Car Stereo Brochures admin.</div>
  <div class="form-card">
    <form id="contactForm">
      <div class="form-grid">
        <div class="form-field"><label for="nameInput">Name <span class="required">*</span></label><input id="nameInput" type="text" required autocomplete="name"></div>
        <div class="form-field"><label for="emailInput">Email <span class="required">*</span></label><input id="emailInput" type="email" required autocomplete="email"></div>
        <div class="form-field"><label for="subjectInput">Subject <span class="required">*</span></label><input id="subjectInput" type="text" required></div>
        <div class="form-field"><label for="messageInput">Message <span class="required">*</span></label><textarea id="messageInput" required></textarea></div>
      </div>
      <div class="action-row">
        <a class="secondary-button" href="index.html">Cancel</a>
        <button class="submit-button" id="submitButton" type="submit">Submit</button>
      </div>
      <div id="statusBox" class="status-box"></div>
    </form>
  </div>
</div>
<script>
const API_BASE = "https://shy-heart-4d13.oyvind-haugland.workers.dev";

const FIELDS = {
  name: "field_8400182",
  email: "field_8400183",
  subject: "field_8400187",
  message: "field_8400205"
};

function applySavedTheme(){
  const savedTheme = localStorage.getItem("brochureTheme") || "dark";
  const logo = document.getElementById("siteLogo");
  if(savedTheme === "dark"){
    document.body.classList.add("dark-mode");
    logo.src = "CarStereoBrochures2 Sort BG.png";
  } else {
    document.body.classList.remove("dark-mode");
    logo.src = "CarStereoBrochures2.png";
  }
}

function toggleTheme(){
  const isDark = document.body.classList.toggle("dark-mode");
  if(isDark){
    localStorage.setItem("brochureTheme", "dark");
    document.getElementById("siteLogo").src = "CarStereoBrochures2 Sort BG.png";
  } else {
    localStorage.setItem("brochureTheme", "light");
    document.getElementById("siteLogo").src = "CarStereoBrochures2.png";
  }
}

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, function(char){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char];
  });
}

function showStatus(message,type){
  const box=document.getElementById("statusBox");
  box.className="status-box "+type;
  box.innerHTML=message;
}

function setLoading(isLoading){
  const button=document.getElementById("submitButton");
  if(isLoading){
    button.textContent="Submitting...";
    button.classList.add("disabled");
  }else{
    button.textContent="Submit";
    button.classList.remove("disabled");
  }
}

async function createContactMessage(payload){
  const res=await fetch(`${API_BASE}/create-contact-message`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
  if(!res.ok){
    const text=await res.text();
    throw new Error("Could not send message: "+text);
  }
  return await res.json();
}

document.getElementById("contactForm").addEventListener("submit",async function(event){
  event.preventDefault();
  const payload={};
  payload[FIELDS.name]=document.getElementById("nameInput").value.trim();
  payload[FIELDS.email]=document.getElementById("emailInput").value.trim();
  payload[FIELDS.subject]=document.getElementById("subjectInput").value.trim();
  payload[FIELDS.message]=document.getElementById("messageInput").value.trim();

  try{
    setLoading(true);
    showStatus("Sending message...","success");
    await createContactMessage(payload);
    showStatus("<strong>Message sent successfully.</strong><br><br>Thank you for contacting us.","success");
    document.getElementById("contactForm").reset();
  }catch(error){
    console.error(error);
    showStatus("Submission failed.<br><br>"+esc(error.message),"error");
  }finally{
    setLoading(false);
  }
});

applySavedTheme();
</script>
</body>
</html>
