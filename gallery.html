<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Stereo Brochure Gallery</title>

<style>
:root{
  --bg:#f2f2f2;
  --card:#ffffff;
  --text:#333333;
  --muted:#777777;
  --border:#cccccc;
  --soft:#eaeaea;
  --link:#1f789d;
  --modal-bg:rgba(0,0,0,.82);
}

body.dark-mode{
  --bg:#151515;
  --card:#242424;
  --text:#eeeeee;
  --muted:#bbbbbb;
  --border:#555555;
  --soft:#333333;
  --link:#7cc7e8;
  --modal-bg:rgba(0,0,0,.88);
}

body{margin:0;padding:20px;background:var(--bg);font-family:Arial,sans-serif;color:var(--text)}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:1400px;margin:auto}
.card{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.12);cursor:pointer}
.card img{width:100%;aspect-ratio:210/297;object-fit:contain;background:var(--soft);display:block}
.info{padding:14px}
.brand{font-size:18px;font-weight:bold}
.title{margin-top:4px;color:var(--text)}
.meta{margin-top:6px;color:var(--muted);font-size:14px}
.page-title{text-align:center;margin-bottom:22px;font-size:22px;font-weight:bold}

.site-header{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  gap:14px 18px;
  max-width:1400px;
  margin:0 auto 24px;
  padding:10px 0;
}

.site-header img{
  height:48px;
  width:auto;
}

.site-header > a:first-child{
  flex:0 0 100%;
  text-align:center;
  order:1;
}

.top-buttons{
  order:2;
}

.filter-row{
  order:3;
}

.filter-row{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.filter-select{
  height:44px;
  padding:0 14px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:16px;
  font-family:Arial,sans-serif;
  background:var(--card);
  color:var(--text);
  max-width:220px;
  box-sizing:border-box;
}

.top-buttons{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:auto;
}

.top-button{
  display:flex;
  align-items:center;
  justify-content:center;
  width:44px;
  min-width:44px;
  height:44px;
  padding:0;
  background:var(--card);
  color:var(--text);
  text-decoration:none;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:26px;
  font-weight:900;
  font-family:Arial,sans-serif;
  line-height:44px;
  cursor:pointer;
  box-sizing:border-box;
}

.icon-back{
  position:relative;
  top:-1px;
  font-size:28px;
  font-weight:700;
}

.icon-home{
  position:relative;
  top:-2px;
  font-size:30px;
  font-weight:700;
}

.theme-icon{
  font-size:22px;
  font-weight:700;
}

.view-toggle{
  cursor:pointer;
  font-size:24px;
  font-weight:700;
}

.modal{
  display:none;
  position:absolute;
  left:0;
  right:0;
  background:var(--modal-bg);
  z-index:9999;
  justify-content:center;
  align-items:flex-start;
  overflow-y:auto;
  padding:30px 16px 0;
  box-sizing:border-box;
}

.modal-content{
  background:var(--card);
  max-width:1000px;
  width:100%;
  border-radius:14px;
  display:grid;
  grid-template-columns:360px 1fr;
  margin-bottom:40px;
  color:var(--text);
}

.modal-image{width:100%;height:100%;object-fit:contain;cursor:pointer;background:var(--soft)}
.modal-info{padding:24px}
.detail-row{margin-bottom:10px}
.detail-label{font-weight:bold}

.button-row{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:10px;
  margin-top:18px;
}

.claim-button,
.close-button{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px 18px;
  height:44px;
  border-radius:8px;
  font-weight:bold;
  font-size:16px;
  font-family:Arial,sans-serif;
  line-height:1;
  white-space:nowrap;
  box-sizing:border-box;
}

.claim-button,
.close-button{
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
  text-decoration:none;
  cursor:pointer;
}

.claim-button:hover,
.close-button:hover{
  background:#3a3a3a;
}

body:not(.dark-mode) .claim-button:hover,
body:not(.dark-mode) .close-button:hover{
  background:#e9eef2;
}

.owner-link,
.series-link{
  text-decoration:none;
  color:var(--link);
  margin-right:8px;
}

.gallery.list-view{
  display:block;
}

.gallery.list-view .card{
  display:grid;
  grid-template-columns:90px 1fr;
  margin-bottom:12px;
}

.gallery.list-view .card img{
  width:90px;
  height:120px;
  aspect-ratio:auto;
}

.gallery.list-view .info{
  padding:12px;
}

.list-extra{
  display:none;
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.gallery.list-view .list-extra{
  display:block;
}

.gallery.list-view .image-meta{
  display:none;
}  

@media(max-width:800px){
  body{
    padding:10px;
  }

  .site-header{
    flex-direction:column;
    align-items:center;
    gap:14px;
  }

  .top-buttons{
  order:2;
  flex-direction:row;
  width:auto;
}

.filter-row{
  order:3;
  width:100%;
}

  .filter-select{
    width:calc(50% - 8px);
    max-width:none;
  }

  .modal{
    padding:20px 10px 0;
  }

  .modal-content{
    grid-template-columns:1fr;
    width:100%;
  }

  .modal-image{
    max-height:70vh;
    object-fit:contain;
  }

  .modal-info{
    padding:18px;
  }
}
</style>

<script>
const BASEROW_TOKEN = "0d9HltmXB6ehmXHOBCrKYDYckO65DKKK";
const TABLE_ID = "959905";
const GALLERY_URL = "https://oyvindhauglandweb.github.io/car-stereo-brochure-gallery/gallery.html";
const PORTAL_URL = "https://oyvindhauglandweb.github.io/car-stereo-brochure-gallery/";

let brochureData = [];
let currentView = "image";

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, function(char){
    return {
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[char];
  });
}

function getUrl(value){
  if (!value) return "";
  if (typeof value === "string") return value;

  if (Array.isArray(value)) {
    for (const item of value) {
      const found = getUrl(item);
      if (found) return found;
    }
    return "";
  }

  if (typeof value === "object") {
    return value.url || value.value || value.link || "";
  }

  return "";
}

function getLookupValue(value){

  if (!value) return "";

  if (typeof value === "string") return value;

  if (Array.isArray(value)) {

    return value
      .map(item => getLookupValue(item))
      .filter(Boolean)
      .join(", ");
  }

  if (typeof value === "object") {

    return (
      getLookupValue(value.value) ||
      value.name ||
      value.text ||
      ""
    );
  }

  return "";
}
  
function applySavedTheme(){
  const savedTheme = localStorage.getItem("brochureTheme") || "dark";
  const button = document.getElementById("themeToggle");

  if(savedTheme === "dark"){
    document.body.classList.add("dark-mode");
    document.getElementById("siteLogo").src = "CarStereoBrochures2 Sort BG.png";
    button.innerHTML = '<span class="theme-icon">◐</span>';
    button.title = "Toggle light mode";
  } else {
    document.body.classList.remove("dark-mode");
    document.getElementById("siteLogo").src = "CarStereoBrochures2.png";
    button.innerHTML = '<span class="theme-icon">◐</span>';
    button.title = "Toggle dark mode";
  }
}

function toggleTheme(){
  const isDark = document.body.classList.toggle("dark-mode");
  const button = document.getElementById("themeToggle");

  if(isDark){
    localStorage.setItem("brochureTheme", "dark");
    document.getElementById("siteLogo").src = "CarStereoBrochures2 Sort BG.png";
    button.innerHTML = '<span class="theme-icon">◐</span>';
    button.title = "Toggle light mode";
  } else {
    localStorage.setItem("brochureTheme", "light");
    document.getElementById("siteLogo").src = "CarStereoBrochures2.png";
    button.innerHTML = '<span class="theme-icon">◐</span>';
    button.title = "Toggle dark mode";
  }
  loadBrochures();
}

async function loadBrochures() {
  applySavedTheme();

  const params = new URLSearchParams(window.location.search);
  const ownerFilter = params.get("owner");
  const modelSeriesFilter = params.get("model_series");
  const brandFilter = params.get("brand");
  const yearFilter = params.get("year");
  const languageFilter = params.get("language");
  const marketFilter = params.get("market");
  const submittedByFilter = params.get("submitted_by");

  if(ownerFilter){
    document.getElementById("pageTitle").innerText = "Brochures owned by " + ownerFilter;
  } else if(modelSeriesFilter){
    document.getElementById("pageTitle").innerText = "Brochures in model series: " + modelSeriesFilter;
  } else if(brandFilter && yearFilter){
    document.getElementById("pageTitle").innerText = brandFilter + " brochures from " + yearFilter;
  } else if(brandFilter && languageFilter){
    document.getElementById("pageTitle").innerText = brandFilter + " brochures in " + languageFilter;
  } else if(brandFilter && marketFilter){
    document.getElementById("pageTitle").innerText = brandFilter + " brochures for " + marketFilter;
  } else if(brandFilter){
    document.getElementById("pageTitle").innerText = brandFilter + " Brochure Gallery";
  } else if(submittedByFilter){
    document.getElementById("pageTitle").innerText = "Brochures submitted by " + submittedByFilter;
  }

  const hasFilter =
    ownerFilter ||
    modelSeriesFilter ||
    brandFilter ||
    yearFilter ||
    languageFilter ||
    marketFilter ||
    submittedByFilter;

  const backButton = document.getElementById("backButton");

  if(hasFilter){
    backButton.href = GALLERY_URL;
  } else {
    backButton.href = PORTAL_URL;
  }

  document.getElementById("resetFilterButton").style.display =
  hasFilter ? "flex" : "none";
  
  let allRows = [];
  let nextUrl = `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=false&size=200`;

  while(nextUrl){
    const res = await fetch(nextUrl, {
      headers: {
        Authorization: `Token ${BASEROW_TOKEN}`
      }
    });

    const data = await res.json();

    allRows = allRows.concat(data.results || []);
    nextUrl = data.next;
  }

setupFilters(allRows, {
  brand: brandFilter,
  year: yearFilter,
  language: languageFilter,
  owner: ownerFilter,
  model_series: modelSeriesFilter
});

  const brochures = allRows
    .filter(item => item.field_8379597?.value !== "Rejected")
    .filter(item => item.field_8379592?.length > 0)
    .filter(item => {
      if (!ownerFilter) return true;
      const owners = item.field_8379595?.map(x => x.value) || [];
      return owners.includes(ownerFilter);
    })
    .filter(item => {
      if (!modelSeriesFilter) return true;
      const series = item.field_8384650?.map(x => x.value) || [];
      return series.includes(modelSeriesFilter);
    })
    .filter(item => {
      if (!brandFilter) return true;
      return item.field_8379585?.[0]?.value === brandFilter;
    })
    .filter(item => {
      if (!yearFilter) return true;
      return item.field_8379588 === yearFilter;
    })
    .filter(item => {
      if (!languageFilter) return true;
      return item.field_8379590?.[0]?.value === languageFilter;
    })
    .filter(item => {
      if (!marketFilter) return true;
      return item.field_8379591?.[0]?.value === marketFilter;
    })
    .filter(item => {
      if (!submittedByFilter) return true;
      const submittedBy = item.field_8379596?.map(x => x.value) || [];
      return submittedBy.includes(submittedByFilter);
    })
    .map(item => ({
      id: item.id,
      brochure: item.field_8379584?.[0]?.value || "",
      brand: item.field_8379585?.[0]?.value || "",
      type: item.field_8379586?.[0]?.value || "",
      model_series: item.field_8384650?.map(x => x.value).join(", ") || "",
      title: item.field_8379608 || "",
      year: item.field_8379588 || "",
      month: item.field_8379589?.value || "",
      language: item.field_8379590?.[0]?.value || "",
      market: item.field_8379591?.[0]?.value || "",
      page_count: item.field_8379594 || "",
      owner: item.field_8379595?.map(x => x.value).join(", ") || "",
      submitted_by: item.field_8379596?.map(x => x.value).join(", ") || "",
      notes: item.field_8379601 || "",
      claim_ownership_url: item.field_8384825?.url || "",
      model_series_guide_url: getUrl(item.field_8460146),
model_series_guide_present: getLookupValue(item.field_8497529),
debug_present_raw: item.field_8497529,
image:
        item.field_8379592?.[0]?.url ||
        item.field_8379592?.[0]?.thumbnails?.card_cover?.url ||
        ""
    }));

  const monthOrder = {
    January: 1,
    February: 2,
    March: 3,
    April: 4,
    May: 5,
    June: 6,
    July: 7,
    August: 8,
    September: 9,
    October: 10,
    November: 11,
    December: 12
  };

  brochures.sort((a, b) => {
    const yearDiff = parseInt(a.year || 0) - parseInt(b.year || 0);

    if(yearDiff !== 0){
      return yearDiff;
    }

    return (monthOrder[a.month] || 0) - (monthOrder[b.month] || 0);
  });

  brochureData = brochures;

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  brochures.forEach((b, index) => {
    gallery.innerHTML += `
      <div class="card" onclick="openModal(${index}, this)">
        <img src="${esc(b.image)}" alt="${esc(b.brochure)}">
        <div class="info">
          <div class="brand">${esc(b.brand)}</div>
          <div class="title">${esc(b.title)}</div>
          <div class="meta image-meta">
            ${esc(b.month)} ${esc(b.year)} • ${esc(b.language)}
          </div>
          <div class="list-extra">
            <div>
              ${esc(b.month)} ${esc(b.year)}
              • ${esc(b.language)}
              • Pages: ${esc(b.page_count)}
            </div>

            <div>
              Model series: ${esc(b.model_series)}
            </div>
          </div>
        </div>
      </div>
    `;
  });
  applySavedView();
  if(brochures.length === 0){
    gallery.innerHTML = "No brochures found.";
  }
}

function openModal(index, card){
  const b = brochureData[index];
  
console.log("Guide present raw:", b.debug_present_raw);
console.log("Guide present parsed:", b.model_series_guide_present);
console.log("Guide URL:", b.model_series_guide_url);
  
  const modal = document.getElementById("modal");
  modal.style.top = Math.max(0, card.offsetTop - 20) + "px";
  modal.style.display = "flex";
  modal.scrollTop = 0;

  document.getElementById("modalImage").src = b.image;
  document.getElementById("modalBrochure").innerText = b.brochure;

  const ownerLinks = b.owner
    ? b.owner.split(", ").map(owner => `
        <a class="owner-link"
           href="${GALLERY_URL}?owner=${encodeURIComponent(owner)}"
           target="_blank"
           title="View brochures owned by ${esc(owner)}">
           ${esc(owner)}
        </a>
      `).join("")
    : "";

  const submittedByLinks = b.submitted_by
    ? b.submitted_by.split(", ").map(name => `
        <a class="series-link"
           href="${GALLERY_URL}?submitted_by=${encodeURIComponent(name)}"
           target="_blank"
           title="View brochures submitted by ${esc(name)}">
           ${esc(name)}
        </a>
      `).join("")
    : "";

  const modelSeriesLinks = b.model_series
    ? b.model_series.split(", ").map(series => `
        <a class="series-link"
           href="${GALLERY_URL}?model_series=${encodeURIComponent(series)}"
           target="_blank"
           title="View brochures in model series: ${esc(series)}">
           ${esc(series)}
        </a>
      `).join("")
    : "";

  document.getElementById("modalDetails").innerHTML = `
    <div class="detail-row">
      <span class="detail-label">Brand:</span>
      <a class="series-link"
         href="${GALLERY_URL}?brand=${encodeURIComponent(b.brand)}"
         target="_blank"
         title="View all ${esc(b.brand)} brochures">
         ${esc(b.brand)}
      </a>
    </div>

    <div class="detail-row"><span class="detail-label">Title:</span> ${esc(b.title)}</div>

    <div class="detail-row">
      <span class="detail-label">Year:</span>
      <a class="series-link"
         href="${GALLERY_URL}?brand=${encodeURIComponent(b.brand)}&year=${encodeURIComponent(b.year)}"
         target="_blank"
         title="View ${esc(b.brand)} brochures from ${esc(b.year)}">
         ${esc(b.year)}
      </a>
    </div>

    <div class="detail-row"><span class="detail-label">Month:</span> ${esc(b.month)}</div>

    <div class="detail-row">
      <span class="detail-label">Language:</span>
      <a class="series-link"
         href="${GALLERY_URL}?brand=${encodeURIComponent(b.brand)}&language=${encodeURIComponent(b.language)}"
         target="_blank"
         title="View ${esc(b.brand)} brochures in ${esc(b.language)}">
         ${esc(b.language)}
      </a>
    </div>

    <div class="detail-row">
      <span class="detail-label">Market:</span>
      <a class="series-link"
         href="${GALLERY_URL}?brand=${encodeURIComponent(b.brand)}&market=${encodeURIComponent(b.market)}"
         target="_blank"
         title="View ${esc(b.brand)} brochures for ${esc(b.market)}">
         ${esc(b.market)}
      </a>
    </div>

    <div class="detail-row"><span class="detail-label">Type:</span> ${esc(b.type)}</div>

    <div class="detail-row">
<span class="detail-label">
  ${
    String(b.model_series_guide_present).includes("Present")
      ? `<a href="model-series.html?brand=${encodeURIComponent(b.brand)}"
   target="_blank"
   style="text-decoration:none;color:var(--link);"
   title="Open model series guide for ${esc(b.brand)}">
   Model series:
</a>`
      : `Model series:`
  }
</span>
${modelSeriesLinks}
    </div>

    <div class="detail-row"><span class="detail-label">Page count:</span> ${esc(b.page_count)}</div>
    <div class="detail-row"><span class="detail-label">Owner:</span> ${ownerLinks}</div>
    <div class="detail-row"><span class="detail-label">Submitted by:</span> ${submittedByLinks}</div>
    <div class="detail-row"><span class="detail-label">Notes:</span> ${esc(b.notes)}</div>
  `;

  const separator = b.claim_ownership_url.includes("?") ? "&" : "?";

document.getElementById("claimButton").href =
  `claim-ownership.html?brochure_id=${encodeURIComponent(b.id)}&returnUrl=${encodeURIComponent(window.location.href)}`;
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function applySavedView(){
  const savedView = localStorage.getItem("brochureView") || "image";
  const gallery = document.getElementById("gallery");
  const button = document.getElementById("viewToggle");

  currentView = savedView;

  if(savedView === "list"){
    gallery.classList.add("list-view");
    button.innerText = "⊞";
    button.title = "Toggle image view";
  } else {
    gallery.classList.remove("list-view");
    button.innerText = "☰";
    button.title = "Toggle list view";
  }
}

function toggleView(){

  const gallery = document.getElementById("gallery");
  const button = document.getElementById("viewToggle");

  if(currentView === "image"){

    currentView = "list";
    localStorage.setItem("brochureView", "list");
    gallery.classList.add("list-view");

    button.innerText = "⊞";
    button.title = "Toggle image view";

  } else {

    currentView = "image";
    localStorage.setItem("brochureView", "image");
    gallery.classList.remove("list-view");

    button.innerText = "☰";
    button.title = "Toggle list view";

  }
}

function fillSelect(selectId, values, selectedValue){
  const select = document.getElementById(selectId);

  values.forEach(value => {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;

    if(value === selectedValue){
      option.selected = true;
    }

    select.appendChild(option);
  });
}

function setupFilters(items, selected){

  const validRows = items
    .filter(item => item.field_8379597?.value !== "Rejected")
    .filter(item => item.field_8379592?.length > 0);

  function rowMatches(item, filterName){

    const brand = item.field_8379585?.[0]?.value || "";
    const year = item.field_8379588 || "";
    const language = item.field_8379590?.[0]?.value || "";
    const owners = item.field_8379595?.map(x => x.value) || [];
    const modelSeries = item.field_8384650?.map(x => x.value) || [];

    if(filterName !== "brand" && selected.brand && brand !== selected.brand) return false;
    if(filterName !== "year" && selected.year && year !== selected.year) return false;
    if(filterName !== "language" && selected.language && language !== selected.language) return false;
    if(filterName !== "owner" && selected.owner && !owners.includes(selected.owner)) return false;
    if(filterName !== "model_series" && selected.model_series && !modelSeries.includes(selected.model_series)) return false;

    return true;
  }

  const brands = [...new Set(
    validRows
      .filter(item => rowMatches(item, "brand"))
      .map(item => item.field_8379585?.[0]?.value)
      .filter(Boolean)
  )].sort();

  const years = [...new Set(
    validRows
      .filter(item => rowMatches(item, "year"))
      .map(item => item.field_8379588)
      .filter(Boolean)
  )].sort();

  const languages = [...new Set(
    validRows
      .filter(item => rowMatches(item, "language"))
      .map(item => item.field_8379590?.[0]?.value)
      .filter(Boolean)
  )].sort();

  const owners = [...new Set(
    validRows
      .filter(item => rowMatches(item, "owner"))
      .flatMap(item => item.field_8379595?.map(x => x.value) || [])
      .filter(Boolean)
  )].sort();

  const modelSeries = [...new Set(
    validRows
      .filter(item => rowMatches(item, "model_series"))
      .flatMap(item => item.field_8384650?.map(x => x.value) || [])
      .filter(Boolean)
  )].sort();

  fillSelect("brandSelect", brands, selected.brand);
  fillSelect("yearSelect", years, selected.year);
  fillSelect("languageSelect", languages, selected.language);
  fillSelect("ownerSelect", owners, selected.owner);
  fillSelect("modelSeriesSelect", modelSeries, selected.model_series);
}

function goWithFilters(overrides){
  const params = new URLSearchParams(window.location.search);

  Object.entries(overrides).forEach(([key, value]) => {
    if(value){
      params.set(key, value);
    } else {
      params.delete(key);
    }
  });

  window.location.href =
    GALLERY_URL + "?" +
    params.toString();
}

function changeBrand(value){ goWithFilters({brand:value}); }
function changeYear(value){ goWithFilters({year:value}); }
function changeLanguage(value){ goWithFilters({language:value}); }
function changeOwner(value){ goWithFilters({owner:value}); }
function changeModelSeries(value){ goWithFilters({model_series:value}); }
  
loadBrochures();
</script>
