async function activateStandardNotification(){
  const button=document.getElementById("activateStandardNotificationButton");
  if(button)button.disabled=true;

  const notificationArea=getSelectedShoppingAreaForNotification();
  const notificationPlace=getNotificationShoppingPlace();
  const activationUrl=`${API_BASE}/shopping/notification-activate-default?shoppingArea=${encodeURIComponent(notificationArea)}&shoppingPlace=${encodeURIComponent(notificationPlace)}`;

  function markNotificationActiveLocal(data, fallbackMessage){
    const shoppingTime=(data && (data.shoppingTime || (data.notification && data.notification.shoppingTime))) || shoppingNotificationShoppingTime || "";
    const recipientCount=(data && Array.isArray(data.recipients)) ? data.recipients.length : 0;
    const activatedPlace=(data && data.shoppingPlace) || notificationPlace || notificationArea || selectedShoppingArea || SHOPPING_AREA_DEFAULT;
    const sentText=(data && data.sentNow) ? " Melding er sendt." : "";
    const timeText=formatLocalDateTimeShort(shoppingTime);

    shoppingNotificationData=(data && data.notification) || shoppingNotificationData || {
      id:(data && data.notificationId) || 0,
      shoppingTime:shoppingTime,
      createdAt:new Date().toISOString(),
      notes:`Butikkgruppe: ${notificationArea}.\nHandles hos: ${activatedPlace}.`
    };

    shoppingNotificationActive=true;
    shoppingNotificationStartedAt=getNotificationStartFromData(shoppingNotificationData)||new Date().toISOString();

    updateActivateStandardNotificationButtonState();

    if(fallbackMessage){
      setStatus(fallbackMessage,"success");
    }else{
      setStatus(`Varsling før handling er aktivert for <strong>${esc(activatedPlace)}</strong>. Tidspunkt for handling: ${esc(timeText)}. Mottakere: ${recipientCount}.${sentText}`,"success");
    }
  }

  function suppressKnownActivationAfterError(message){
    // Denne feilen skjer etter at Worker allerede har opprettet varslingen.
    // Den skal derfor aldri vises som "Kunne ikke aktivere".
    return String(message||"").toLowerCase().indexOf("gettime") >= 0;
  }

  try{
    const data=await fetchJson(activationUrl,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=UTF-8"},
      body:JSON.stringify({
        shoppingArea:notificationArea,
        shoppingPlace:notificationPlace
      })
    });

    markNotificationActiveLocal(data,"");
  }catch(error){
    const message=String(error && error.message || error || "");

    // Før vi viser rød feilmelding: sjekk om Worker likevel rakk å opprette varslingen.
    // Dette gjøres for alle feil, fordi nettopp denne funksjonen tidligere ga "falsk feil".
    try{
      await new Promise(resolve=>window.setTimeout(resolve,1300));
      await refreshShoppingNotificationState(true);

      if(shoppingNotificationActive){
        updateActivateStandardNotificationButtonState();
        setStatus(`Varsling før handling er aktivert for <strong>${esc(notificationPlace || notificationArea)}</strong>.`, "success");
        if(button)button.disabled=false;
        return;
      }
    }catch(confirmError){
      console.warn("Ettersjekk av varsling feilet.", confirmError);
    }

    if(suppressKnownActivationAfterError(message)){
      markNotificationActiveLocal(null,`Varsling før handling er aktivert for <strong>${esc(notificationPlace || notificationArea)}</strong>.`);
      if(button)button.disabled=false;

      try{
        window.setTimeout(function(){
          refreshShoppingNotificationState(true)
            .then(function(){ updateActivateStandardNotificationButtonState(); })
            .catch(function(err){ console.warn("Ettersjekk av varsling feilet.", err); });
        },2000);
      }catch(ignore){}

      return;
    }

    setStatus(`Kunne ikke aktivere varsling før handling.<br><br>${esc(message)}`,"error");
    if(button)button.disabled=false;
    return;
  }

  try{
    await refreshShoppingNotificationState(true);
  }catch(error){
    console.warn("Kunne ikke bekrefte aktiv varsling etter aktivering.", error);
  }

  try{
    flushDeferredNewItemPopupIfAllowed();
    queueCurrentItemsAddedAfterActiveContext(items.filter(areaMatchesSelected));
  }catch(error){
    console.warn("Ikke-kritisk feil etter aktivert varsling.", error);
  }finally{
    updateActivateStandardNotificationButtonState();
    if(button)button.disabled=false;
  }
}

function getActiveNewItemContextStart(){
  // v48: Bruk kun aktiv varsling fra Worker/API eller pågående handling.
  if(shoppingNotificationActive){
    return shoppingNotificationStartedAt || normalizeIsoDateTime(new Date(Date.now()-5*60000).toISOString());
  }
  if(isShoppingInProgress()){
    return getShoppingInProgressSince() || normalizeIsoDateTime(new Date(Date.now()-5*60000).toISOString());
  }
  return "";
}
function getNotificationStartFromData(activeNotification){
  if(!activeNotification)return "";

  // Viktig for mobil/ny enhet:
  // Vi må bruke tidspunktet varslingen ble OPPRETTET/AKTIVERT, ikke "Melding sendes".
  // Hvis Worker en periode ikke returnerer createdAt, bruker vi trygg fallback lenger bak i tid,
  // slik at varer lagt til etter at varslingen ble aktivert fortsatt blir fanget opp når siden åpnes senere.
  const explicitStart=normalizeIsoDateTime(
    activeNotification.activationStartedAt ||
    activeNotification.activatedAt ||
    activeNotification.savedAt ||
    activeNotification.createdAt ||
    activeNotification.created_at ||
    activeNotification.created ||
    activeNotification.createdOn ||
    activeNotification.created_on ||
    ""
  );

  if(explicitStart)return explicitStart;

  const now=Date.now();
  const notifyAt=normalizeIsoDateTime(activeNotification.notifyAt || "");
  const shoppingTime=normalizeIsoDateTime(activeNotification.shoppingTime || "");
  const minutes=minutesToNumber(activeNotification.notifyMinutesBefore || "0 minutter");

  // Hvis notifyAt er frem i tid, kan den IKKE brukes som start.
  // Bruk heller shoppingTime - varslingstid hvis det gir mening, men aldri frem i tid.
  if(shoppingTime){
    const calculatedStart=new Date(shoppingTime).getTime()-minutes*60000;
    if(Number.isFinite(calculatedStart) && calculatedStart<=now){
      return new Date(calculatedStart).toISOString();
    }
  }

  if(notifyAt){
    const notifyTime=new Date(notifyAt).getTime();
    if(Number.isFinite(notifyTime) && notifyTime<=now){
      return notifyAt;
    }
  }

  // Siste fallback: aktiv varsling finnes, men starttidspunkt mangler/er frem i tid.
  // Da må vi heller være litt for raus enn å overse varer på mobil.
  return new Date(now-24*60*60000).toISOString();
}

function getActiveNewItemContextKey(){

  if(standardContext){
    return `standard:${standardContext.startedAt || standardContext.shoppingTime || "active"}`;
  }
  if(isShoppingInProgress()){
    return `shopping:${getShoppingInProgressSince() || "active"}`;

  return "inactive";
}

function rememberDeferredNewItems(newItems){

  relevant.forEach(item=>{

    deferredNewItems.push(item);

function scheduleNewItemPopup(fresh){
  const relevant=(Array.isArray(fresh)?fresh:[]).filter(item=>item&&item.id);
  updateNewItemDebug({scheduleInputCount:relevant.length},`scheduleNewItemPopup kjørt med ${relevant.length} vare(r)`);
  if(!relevant.length)return;
  pendingNewItems=(pendingNewItems||[]).concat(relevant);
  const now=Date.now();
  const delays=relevant.map(item=>{
    const addedAt=normalizeIsoDateTime(item.addedAt||getItemAddedAt(item)||"");
    const time=addedAt?new Date(addedAt).getTime():now;
    return Math.max(0,time+60000-now);
  }).filter(value=>Number.isFinite(value));
  const delay=delays.length?Math.min.apply(null,delays):60000;
  const seconds=Math.max(0,Math.ceil(delay/1000));
  updateNewItemDebug({pendingCount:(pendingNewItems||[]).length,timerText:`Popup om ca. ${seconds} sekunder`,freshCount:relevant.length},`Popup-timer satt: ${seconds} sekunder`);
  const names=relevant.map(item=>String(item.name||"Vare")).filter(Boolean).slice(0,3).join(", ");
  newItemsStatusActive=true;
  setStatus(`Nye varer er lagt til${names?`: ${esc(names)}`:""}. Varsel vises ${seconds>5?`om ca. ${seconds} sekunder`:"nå"}.`,"success");
  if(pendingNewItemTimer)window.clearTimeout(pendingNewItemTimer);
  pendingNewItemTimer=window.setTimeout(showPendingNewItemsPopup,delay);
}
function queueNewItemPopup(newItems){
  const relevant=(Array.isArray(newItems)?newItems:[]).filter(item=>item&&item.shouldBuy&&!item.standardItem);
  updateNewItemDebug({queueInputCount:relevant.length,shoppingInProgress:isShoppingInProgress(),shoppingInProgressSince:getShoppingInProgressSince()},`queueNewItemPopup: ${relevant.length} relevant(e) vare(r)`);
  if(!relevant.length)return;

  if(!shouldShowNewItemPopup()){
    updateNewItemDebug({deferredCount:(deferredNewItems||[]).length+relevant.length},"Varsling/handling ikke aktiv - legger i deferred kø");
    rememberDeferredNewItems(relevant);
    return;
  }

  const seen=getSeenNewItemAlerts();
  const fresh=[];
  relevant.forEach(item=>{
    const key=getSeenNewItemAlertKey(item);
    if(!key || seen[key])return;
    const addedAt=getItemAddedAt(item)||rememberItemAddedAt(item.id,new Date().toISOString());
    seen[key]=addedAt;
    fresh.push(Object.assign({}, item, {addedAt:addedAt}));
  });
  saveSeenNewItemAlerts(seen);

  if(!fresh.length){
    updateNewItemDebug({freshCount:0},"Ingen fresh varer i denne varslingskonteksten - sannsynligvis allerede varslet/sett");
    return;
  }

  updateNewItemDebug({freshCount:fresh.length},`Fresh varer klare: ${fresh.map(item=>item.name||item.id).join(", ")}`);
  scheduleNewItemPopup(fresh);
}

function setNewItemsStatusForCandidates(candidates){

  const names=relevant.map(item=>String(item.name||"Vare")).filter(Boolean).slice(0,5).join(", ");

  }).filter(value=>Number.isFinite(value));

  newItemsStatusActive=true;
  setStatus(`Nye varer er lagt til etter at varsling/handel ble aktiv${names?`: ${esc(names)}${esc(extra)}`:""}. ${seconds>5?`Popup vises om ca. ${seconds} sekunder.`:"Popup vises nå."}`,"success");
}

function queueCurrentItemsAddedAfterActiveContext(loadedItems){
  const allowed=shouldShowNewItemPopup();
  updateNewItemDebug({shoppingInProgress:isShoppingInProgress(),shoppingInProgressSince:getShoppingInProgressSince(),notificationActive:shoppingNotificationActive,notificationStartedAt:shoppingNotificationStartedAt||""},allowed?"Aktiv kontekst finnes":"Ingen aktiv varsling/handling");
  if(!allowed)return;
  const contextStart=getActiveNewItemContextStart();
  if(!contextStart){updateNewItemDebug({contextStart:""},"Mangler contextStart");return;}
  const startTime=new Date(contextStart).getTime()-5000;
  if(!Number.isFinite(startTime))return;
  updateNewItemDebug({contextStart},`Sjekker varer etter contextStart ${contextStart}`);
  const candidates=(Array.isArray(loadedItems)?loadedItems:[]).filter(item=>{
    if(!item||!item.shouldBuy||item.standardItem)return false;
    const addedAt=getItemAddedAt(item);
    if(!addedAt)return false;
    const addedTime=new Date(addedAt).getTime();
    return Number.isFinite(addedTime)&&addedTime>=startTime;
  });
  updateNewItemDebug({candidateCount:candidates.length},`Fant ${candidates.length} kandidat(er) etter aktiv start`);
  if(candidates.length){
    setNewItemsStatusForCandidates(candidates);
    queueNewItemPopup(candidates);
  }else if(shoppingNotificationActive && !newItemsStatusActive){
    setStatus("Varsling er aktiv. Ingen nye varer etter varslingsstart er funnet i handlelisten ennå.", "success");
  }
}

function registerLoadedItemsForTimestampsAndAlerts(loadedItems){
  const ordered=(Array.isArray(loadedItems)?loadedItems:[]).filter(item=>item&&item.shouldBuy);
  updateNewItemDebug({itemsTotal:Array.isArray(loadedItems)?loadedItems.length:0,shouldBuyCount:ordered.length,nonStandardShouldBuyCount:ordered.filter(item=>!item.standardItem).length},`registerLoadedItems: ${ordered.length} skal handles`);
  const currentIds=new Set(ordered.map(item=>Number(item.id)).filter(Boolean));
  const map=getItemAddedAtMap();
  let changed=false;
  ordered.forEach(item=>{
    const id=Number(item.id||0);

    const apiValue=normalizeIsoDateTime(getApiAddedAt(item));
    if(apiValue && map[String(id)]!==apiValue){
      map[String(id)]=apiValue;
      changed=true;
    }
  });
  if(changed)saveItemAddedAtMap(map);

  // Robust kontroll også på første innlasting/etter sideskifte:
  // Når varsling er aktiv eller handling pågår, skal varer lagt til etter starttidspunktet
  // gi statusmelding umiddelbart og popup etter ca. 1 minutt fra lagt-til-tidspunktet.
  queueCurrentItemsAddedAfterActiveContext(ordered);

  if(previousOrderedItemIds===null){
    previousOrderedItemIds=currentIds;
    return;
  }
  const newItems=ordered.filter(item=>Number(item.id||0)&&!previousOrderedItemIds.has(Number(item.id)));

  newItems.forEach(item=>{
    if(!item.standardItem && !getItemAddedAt(item)){

  });

  queueNewItemPopup(newItems);
}

function getShoppingLocation(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){
      resolve({status:"error", message:"Nettleseren støtter ikke GPS/geolocation."});
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position=>{
        resolve({
          status:"ok",
          latitude:position.coords.latitude,
          longitude:position.coords.longitude,
          accuracy:position.coords.accuracy
        });
      },
      error=>{
        const code=error && error.code;
        const message=error && error.message ? error.message : "Ukjent GPS-feil";
        resolve({
          status:code === 1 ? "denied" : "error",
          code,
          message
        });
      },
      {
        enableHighAccuracy:true,
        timeout:15000,
        maximumAge:0
      }
    );
  });
}

function formatGpsLocation(location){
  if(!location){
    return "Ingen GPS-respons.";
  }

  if(location.status === "ok"){
    const lat=Number(location.latitude).toFixed(6);
    const lon=Number(location.longitude).toFixed(6);
    const acc=location.accuracy !== null && location.accuracy !== undefined
      ? `${Math.round(Number(location.accuracy))} m`
      : "ukjent";
    return `GPS OK: ${lat}, ${lon}. Nøyaktighet: ${acc}.`;
  }

  if(location.status === "denied"){
    return `GPS avslått av bruker/nettleser${location.message ? `: ${esc(location.message)}` : "."}`;
  }

  return `GPS-feil${location.message ? `: ${esc(location.message)}` : "."}`;
}

async function testGpsLocation(){
  setStatus("Tester GPS-posisjon...");
  const location=await getShoppingLocation();
  setStatus(formatGpsLocation(location), location.status === "ok" ? "success" : "error");
}

function isLikelyMobileDevice(){
  return (
    /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "") ||
    (navigator.maxTouchPoints && navigator.maxTouchPoints > 1) ||
    (window.matchMedia && window.matchMedia("(max-width: 800px)").matches)
  );
}

function setStoreMatchStatus(message, type){
  const card=document.getElementById("storeMatchCard");
  const status=document.getElementById("storeMatchStatus");

  if(!card || !status){
    return;
  }

  if(!message){
    card.style.display="none";
    status.innerHTML="";
    status.className="status";
    return;
  }

  card.style.display="block";
  status.className="status" + (type ? ` ${type}` : "");
  status.innerHTML=message;
}

function formatStoreMatchResult(data){
  const matchStatus=String((data && data.storeMatchStatus) || "");
  const storeName=String((data && data.storeName) || (data && data.store && data.store.name) || "").trim();
  const storeChain=String((data && data.storeChain) || (data && data.store && data.store.chain) || "").trim();
  const logoUrl=String((data && data.storeLogoUrl) || (data && data.logoUrl) || (data && data.store && data.store.logoUrl) || "").trim();
  const distance=(data && data.storeDistance);
  const location=(data && data.location) || {};
  const accuracy=location.accuracy !== null && location.accuracy !== undefined
    ? `${Math.round(Number(location.accuracy))} m`
    : "ukjent";

  if(storeName){
    const label=[storeChain,storeName].filter(Boolean).join(" ").trim();
    const distanceText=distance !== null && distance !== undefined ? ` · ${Math.round(Number(distance))} m unna` : "";
    const prefix=matchStatus === "Uncertain" ? "Mulig butikk" : "Du ser ut til å være hos";
    const suffix=matchStatus === "Uncertain" ? " · usikkert treff" : "";
    const text=`${prefix}: <strong>${esc(label)}</strong>${distanceText}${suffix}<br>GPS-nøyaktighet: ${esc(accuracy)}`;
    const logo=logoUrl ? `<img class="store-logo" src="${esc(logoUrl)}" alt="${esc(storeChain || storeName)} logo" loading="lazy" decoding="async" onerror="this.style.display='none'">` : "";
    return `<div class="store-match-line"><div class="store-match-text">${text}</div>${logo}</div>`;
  }

  if(matchStatus === "No match"){
    const lat=location.latitude !== null && location.latitude !== undefined ? Number(location.latitude).toFixed(4) : "?";
    const lon=location.longitude !== null && location.longitude !== undefined ? Number(location.longitude).toFixed(4) : "?";
    return `Fant ingen kjent butikk her.<br>GPS: ${esc(lat)}, ${esc(lon)} · nøyaktighet: ${esc(accuracy)}`;
  }

  if(matchStatus === "Location denied"){
    return "GPS-tilgang er avslått. Butikk kan ikke foreslås automatisk.";
  }

  if(matchStatus === "Location error"){
    return "Kunne ikke hente GPS-posisjon. Butikk kan ikke foreslås automatisk.";
  }

  return "Butikk kunne ikke foreslås automatisk.";
}

let storeMatchRunning=false;
async function checkCurrentStore(silent){
  if(storeMatchRunning){
    return;
  }

  storeMatchRunning=true;

  try{
    if(!silent){
      setStoreMatchStatus("Sjekker hvilken butikk du er i...");
    }

    const location=await getShoppingLocation();

    if(location.status !== "ok"){
      setStoreMatchStatus(formatGpsLocation(location), "error");
      return;
    }

    const data=await fetchJson(`${API_BASE}/shopping/store-match`,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=UTF-8"},
      body:JSON.stringify({
        location,
        latitude:location.latitude,
        longitude:location.longitude,
        accuracy:location.accuracy,
        locationStatus:location.status,
        shoppingArea:selectedShoppingArea
      })
    });

    const matched=!!(data.storeName || (data.store && data.store.name));
    const uncertain=String(data.storeMatchStatus || "") === "Uncertain";
    const matchedChain=String(data.storeChain || (data.store && data.store.chain) || "").trim();
    const matchedName=String(data.storeName || (data.store && data.store.name) || "").trim();
    currentShoppingPlace=matched
      ? (matchedChain || selectedShoppingArea || SHOPPING_AREA_DEFAULT)
      : defaultShoppingPlaceForArea(selectedShoppingArea);

    if(Array.isArray(data.typeOrder) && data.typeOrder.length){
      typeOrder=data.typeOrder;
      currentStoreChain=data.typeOrderChain || matchedChain || "Standard";
      render();
    }

    setStoreMatchStatus(formatStoreMatchResult(data), matched && !uncertain ? "success" : "");
  }catch(error){
    setStoreMatchStatus(`Kunne ikke sjekke butikk.<br><br>${esc(error.message)}`, "error");
  }finally{
    storeMatchRunning=false;
  }
}

function autoCheckStoreOnMobile(){
  if(!isLikelyMobileDevice()){
    return;
  }

  window.setTimeout(() => {
    checkCurrentStore(true);
  }, 800);
}

function shoppingSessionStatusText(session){
  if(!session){
    return "";
  }

  const status=String(session.storeMatchStatus||"");
  const store=[session.storeChain,session.storeName].filter(Boolean).join(" ").trim();

  if(store){
    const distance=session.storeDistance!==null&&session.storeDistance!==undefined?`, ca. ${session.storeDistance} m` : "";
    const unsure=status==="Uncertain" ? " usikkert" : "";
    return ` Butikk${unsure}: ${store}${distance}.`;
  }

  if(status==="No match")return " Ingen butikk ble matchet.";
  if(status==="No location")return " Handelen ble lagret uten posisjon.";
  if(status==="Location denied")return " Handelen ble lagret uten posisjon fordi tilgang ble avslått.";
  if(status==="Location error")return " Handelen ble lagret uten butikkmatch på grunn av GPS-feil.";

  return "";
}

function formatLocationDebug(data, clientLocation){
  const debug=(data && data.locationDebug) || {};
  const parts=[];
  parts.push(`<br><br><strong>GPS-diagnose:</strong>`);
  parts.push(`<br>Mobil/nettleser: ${esc(formatGpsLocation(clientLocation))}`);
  parts.push(`<br>Worker mottok: lat=${esc((debug.latitude == null ? "tom" : debug.latitude))}, lon=${esc((debug.longitude == null ? "tom" : debug.longitude))}, accuracy=${esc((debug.gpsAccuracy == null ? "tom" : debug.gpsAccuracy))}, status=${esc((debug.status == null ? "tom" : debug.status))}`);
  parts.push(`<br>Session opprettet: ${debug.sessionCreated ? "ja" : "nei"}`);

  if(debug.sessionPatchResult){
    parts.push(`<br>Session patch: ${esc(JSON.stringify(debug.sessionPatchResult))}`);
  }

  if(debug.sessionError){
    parts.push(`<br>Session-feil: ${esc(debug.sessionError)}`);
  }

  return parts.join("");
}

async function finishShopping(){
  if(!boughtIds.size){
    alert("Kryss av minst én vare som handlet først.");
    return;
  }

  if(!confirm(`Avslutte handel og lagre ${boughtIds.size} handlet vare${boughtIds.size===1?"":"r"}?`)){
    return;
  }

  const button=document.getElementById("finishButton");
  button.disabled=true;

  let location={status:"none"};

  try{
    setStatus("Henter GPS-posisjon før handelen avsluttes...");
    location=await getShoppingLocation();

    if(location.status !== "ok"){
      const continueWithoutGps=confirm(`${formatGpsLocation(location).replace(/<[^>]+>/g, "")}\n\nFortsette og avslutte handelen uten GPS?`);

      if(!continueWithoutGps){
        setStatus(formatGpsLocation(location), "error");
        return;
      }
    }

    const allBoughtIds=Array.from(boughtIds);
    const chunkSize=8;
    const chunks=[];

    for(let index=0; index<allBoughtIds.length; index+=chunkSize){
      chunks.push(allBoughtIds.slice(index,index+chunkSize));
    }

    let totalBought=0;
    let lastData=null;

    for(let index=0; index<chunks.length; index+=1){
      setStatus(`${formatGpsLocation(location)}<br>Sender avslutning til Worker... Del ${index+1} av ${chunks.length}.`, location.status === "ok" ? "success" : "error");

      const data=await fetchJson(`${API_BASE}/shopping/finish`,{
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=UTF-8"},
        body:JSON.stringify({
          boughtIds:chunks[index],
          chunkIndex:index+1,
          chunkCount:chunks.length,
          location,
          latitude:(location && location.latitude),
          longitude:(location && location.longitude),
          accuracy:(location && location.accuracy),
          locationStatus:(location && location.status),
          shoppingArea:selectedShoppingArea
        })
      });

      totalBought += Number(data.boughtCount || chunks[index].length || 0);
      lastData=data;
    }

    clearRememberedBoughtIds();
    clearShoppingAreaStorage(SHOPPING_ACTIVE_AREA_STORAGE_KEY);
    renderShoppingAreaButtons();
    await loadItems();
    setStatus(`Handelen er avsluttet. ${totalBought} varer ble lagret som handlet.${shoppingSessionStatusText((lastData && lastData.session))}`,"success");
  }catch(error){
    setStatus(`Kunne ikke avslutte handelen.<br><br>${esc(error.message)}<br><br>${esc(formatGpsLocation(location))}`,"error");
  }finally{
    button.disabled=false;
    render();
  }
}

<script>
(function(){
  const APP_PAGE_RE = /^handleliste-[a-z0-9-]+\.html$/i;
  const HOME_TARGET = 'index.html?restoreMenu=1';

  function currentPage(){
    return location.pathname.split('/').pop() || 'handleliste-bestille.html';
  }

  function isAppPage(page){
    return APP_PAGE_RE.test(String(page || ''));
  }

  function safeAppTarget(value){
    if(!value) return '';
    try{
      const url = new URL(value, location.href);
      if(url.origin !== location.origin) return '';
      const page = url.pathname.split('/').pop();
      if(!isAppPage(page)) return '';
      return page + url.search + url.hash;
    }catch(e){
      const clean = String(value).trim();
      const page = clean.split('?')[0].split('#')[0];
      return isAppPage(page) ? clean : '';
    }
  }

  function currentTargetForBack(){
    const url = new URL(location.href);
    const page = currentPage();
    const params = new URLSearchParams(url.search);
    const legacyFrom = params.get('from');
    const existingBack = params.get('back');

    params.delete('from');

    if(!existingBack && legacyFrom){
      const safeLegacy = safeAppTarget(legacyFrom);
      if(safeLegacy) params.set('back', safeLegacy);
    }

    const query = params.toString();
    return page + (query ? '?' + query : '') + url.hash;
  }

  function getBackTarget(){
    const params = new URLSearchParams(location.search);
    return safeAppTarget(params.get('back')) || safeAppTarget(params.get('from')) || HOME_TARGET;
  }

  function addBackToUrl(rawHref){
    if(!rawHref) return rawHref;
    if(/^#|^(mailto|sms|tel|javascript):/i.test(rawHref)) return rawHref;

    try{
      const url = new URL(rawHref, location.href);
      if(url.origin !== location.origin) return rawHref;
      const page = url.pathname.split('/').pop();
      const here = currentPage();

      if(isAppPage(page) && page !== here){
        url.searchParams.delete('from');
        if(!url.searchParams.has('back')){
          url.searchParams.set('back', currentTargetForBack());
        }
        return page + url.search + url.hash;
      }
    }catch(e){}

    return rawHref;
  }

  function appBack(event){
    event.preventDefault();
    location.href = getBackTarget();
  }

  function initAppNavigation(){
    document.querySelectorAll('a[href]').forEach(function(anchor){
      const href = anchor.getAttribute('href');
      const nextHref = addBackToUrl(href);
      if(nextHref !== href) anchor.setAttribute('href', nextHref);
    });

    document.querySelectorAll('.top-buttons .top-button').forEach(function(button){
      if((button.textContent || '').trim() === '←'){
        button.addEventListener('click', appBack);
      }
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initAppNavigation);
  }else{
    initAppNavigation();
  }
})();
</script>


<script>
/* Handleliste v51: lokal navigasjonsstack for tilbakeknapp innen Handleliste */
(function(){
  const STACK_KEY = "kvimarka92HandlelisteBackStack";
  const HOME_TARGET = "index.html?restoreMenu=1";
  const HANDLE_PAGE_RE = /^handleliste-[a-z0-9-]+\.html$/i;
  const MAX_STACK = 30;

  function pageFromUrl(value){
    try{
      const url = new URL(value, location.href);
      return url.pathname.split("/").pop() || "";
    }catch(error){
      return String(value || "").split("?")[0].split("#")[0].split("/").pop() || "";
    }
  }

  function isHandlelisteUrl(value){
    return HANDLE_PAGE_RE.test(pageFromUrl(value));
  }

  function relativeUrl(value){
    try{
      const url = new URL(value, location.href);
      if(url.origin !== location.origin) return "";
      const page = url.pathname.split("/").pop() || "";
      if(!HANDLE_PAGE_RE.test(page)) return "";
      return page + url.search + url.hash;
    }catch(error){
      const text = String(value || "").trim();
      return isHandlelisteUrl(text) ? text : "";
    }
  }

  function currentRelativeUrl(){
    const page = location.pathname.split("/").pop() || "";
    return page + location.search + location.hash;
  }

  function readStack(){
    try{
      const parsed = JSON.parse(sessionStorage.getItem(STACK_KEY) || "[]");
      return Array.isArray(parsed) ? parsed.filter(isHandlelisteUrl) : [];
    }catch(error){
      return [];
    }
  }

  function writeStack(stack){
    try{
      sessionStorage.setItem(STACK_KEY, JSON.stringify(stack.slice(-MAX_STACK)));
    }catch(error){}
  }

  function pushCurrentToHandlelisteStack(){
    const current = currentRelativeUrl();
    if(!isHandlelisteUrl(current)) return;
    const stack = readStack();
    if(stack[stack.length - 1] !== current){
      stack.push(current);
      writeStack(stack);
    }
  }

  function popPreviousFromHandlelisteStack(){
    const current = currentRelativeUrl();
    const stack = readStack();
    let target = "";
    while(stack.length){
      const candidate = stack.pop();
      if(candidate && candidate !== current){
        target = candidate;
        break;
      }
    }
    writeStack(stack);
    return target;
  }

  window.pushHandlelisteBackUrl = pushCurrentToHandlelisteStack;
  window.goHandlelisteBackOrHome = function(event){
    if(event){
      event.preventDefault();
      if(event.stopImmediatePropagation) event.stopImmediatePropagation();
      event.stopPropagation();
    }
    location.href = popPreviousFromHandlelisteStack() || HOME_TARGET;
    return false;
  };

  function shouldIgnoreClick(event, anchor){
    if(event.defaultPrevented) return true;
    if(event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return true;
    if(anchor.target && anchor.target !== "_self") return true;
    if(anchor.hasAttribute("download")) return true;
    const href = anchor.getAttribute("href") || "";
    if(!href || href === "#" || href.startsWith("#")) return true;
    if(/^(mailto|sms|tel|javascript):/i.test(href)) return true;
    return false;
  }

  document.addEventListener("click", function(event){
    const anchor = event.target && event.target.closest ? event.target.closest("a[href]") : null;
    if(!anchor) return;

    const isBackButton = anchor.hasAttribute("data-handleliste-back") ||
      (anchor.classList && anchor.classList.contains("top-button") && (anchor.textContent || "").trim() === "←");

    if(isBackButton){
      window.goHandlelisteBackOrHome(event);
      return;
    }

    const href = anchor.getAttribute("href") || "";

    if(/^(index\.html|\/index\.html)/i.test(href)){
      try{ sessionStorage.removeItem(STACK_KEY); }catch(error){}
      return;
    }

    if(shouldIgnoreClick(event, anchor)) return;

    if(isHandlelisteUrl(href)){
      const target = relativeUrl(href);
      if(target && target !== currentRelativeUrl()){
        pushCurrentToHandlelisteStack();
      }
    }
  }, true);
})();
</script>
