<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Stereo Brochures</title>

<style>

body{
  margin:0;
  padding:20px;
  background:#f2f2f2;
  font-family:Arial,sans-serif;
  color:#333;
}

.container{
  max-width:1200px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:40px;
}

.logo{
  max-width:320px;
  width:100%;
  height:auto;
}

.tagline{
  margin-top:10px;
  font-size:18px;
  color:#667;
}

.section{
  margin-bottom:40px;
}

.section h2{
  margin-bottom:16px;
  font-size:22px;
}
.main-actions{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.wide-button{
  width:100%;
}

.button-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.portal-button{
  display:flex;
  align-items:center;
  justify-content:center;
  height:44px;
  padding:0 18px;
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
  text-decoration:none;
  color:#333;
  font-size:16px;
  font-weight:bold;
  box-sizing:border-box;
  white-space:nowrap;
  overflow:hidden;
}

.portal-button:hover{
  background:#e9eef2;
}

.primary{
  background:white;
  color:#333;
  border:1px solid #ccc;
}

.primary:hover{
  background:#17627f;
}

.community-card{
  background:#f2f2f2;
  padding:0;
  border:none;
}

.community-card h3{
  margin-top:0;
}

.community-link{
  display:block;
  margin-top:12px;
  color:#1f789d;
  text-decoration:none;
  font-weight:bold;
}

  .tribute-button{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:44px;
  padding:14px 18px;
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
  text-decoration:none;
  color:#333;
  font-size:16px;
  font-weight:bold;
  font-family:Arial,sans-serif;
  box-sizing:border-box;
  text-align:center;
}

.admin-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.guide-row{
  width:100%;
}

.guide-select{
  width:100%;
  height:48px;
  padding:0 18px;
  background:white;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  font-family:Arial,sans-serif;
  box-sizing:border-box;
  text-align:center;
  text-align-last:center;
}
.facebook-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(220px, 1fr));
  gap:12px;
  margin-top:20px;
}
.facebook-grid .guide-select{
  height:48px;
}
@media(max-width:800px){
  .facebook-grid{
    grid-template-columns:1fr;
  }
}

.admin-button{
  display:flex;
  align-items:center;
  justify-content:center;
  height:44px;
  background:#667;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

@media(max-width:800px){

  body{
    padding:14px;
  }

  .portal-button{
    height:44px;
    font-size:16px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img class="logo"
         src="CarStereoBrochures2.png"
         alt="Car Stereo Brochures">

    <div class="tagline">
      Explore • Preserve • Share
    </div>
  </div>

  <div class="section">

    <h2>Main</h2>

    <div class="main-actions">

  <a class="portal-button wide-button"
     href="gallery.html">
     Public Gallery
  </a>

  <div class="button-grid">

    <a class="portal-button"
       href="https://baserow.io/form/8oPGD7rTp5rhKQoUoIMg0PCHtgvvwgONL5e3VQNSidE">
       Add New Brochure
    </a>

    <a class="portal-button"
       href="https://baserow.io/form/2wePvgKoYp4pV_ZgBLywme2HFPXTI72kdddg3u183S4">
       Request Access
    </a>

    <a class="portal-button placeholder-button"
       href="#">
       -----

<a class="portal-button"
   href="https://sites.google.com/view/carstereobrochuresmenu/car-stereo-brochures-catalog/help"
   target="_blank">
   Help
</a>

  </div>

</div>

  </div>

  <div class="section">

    <div class="community-card">

    <div class="guide-row">


<select id="brandGuideSelect" class="guide-select">
  <option value="">
    Choose Model Series guide
  </option>
</select>
      </div>
    </div>

  </div>

  <div class="section">
  <h2>Facebook-groups</h2>
    <a class="tribute-button"
   href="https://www.facebook.com/groups/1552004781684334/"
   target="_blank">
   Alpine Collectors and Fans Group
</a>
    <div class="facebook-grid">

  <select id="classicSelect" class="guide-select">
    <option value="">Classic groups...</option>
  </select>

  <select id="buySellSelect" class="guide-select">
    <option value="">Buy / Sell...</option>
  </select>

  <select id="alpineSelect" class="guide-select">

  </select>

  <select id="pioneerSelect" class="guide-select">
    <option value="">Pioneer groups...</option>

  </select>

  <select id="spareSelect" class="guide-select">

</div>
  </div>

  <div class="section">

    <div class="admin-grid">

      <a class="admin-button"

      <a class="admin-button"

      </a>

  </div>

</div>

<script>

const BASEROW_TOKEN = "JSKwdkacSx14GysDRxSR490ZLUygwvVA";

async function loadBrandGuides(){

  const TABLE_ID = "957417";

  const res = await fetch(
    `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=false&size=200`,
    {
      headers:{
        Authorization:`Token ${BASEROW_TOKEN}`
      }
    }
  );

  const data = await res.json();

  const select = document.getElementById("brandGuideSelect");

  data.results
    .filter(item => item.field_8476152?.value === "Present")
    .forEach(item => {

      const brand =
        item.field_8351135 || "";

      const url =
        item.field_8445075 || "";

      if(!brand || !url) return;

      const option = document.createElement("option");

      option.value = url;
      option.textContent = brand;

      select.appendChild(option);

    });

  select.addEventListener("change", e => {

    if(e.target.value){
      window.location.href = e.target.value;
    }

  });

}

async function loadFacebookLinks(){

  const TABLE_ID = "969808";

  const res = await fetch(
    `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=false&size=200`,
    {
      headers:{
        Authorization:`Token ${BASEROW_TOKEN}`
      }
    }
  );

  const data = await res.json();

function getFacebookSelectId(group){
  const g = String(group || "").toLowerCase();

  if(g.includes("classic")) return "classicSelect";
  if(g.includes("buy")) return "buySellSelect";
  if(g.includes("sell")) return "buySellSelect";
  if(g.includes("alpine")) return "alpineSelect";
  if(g.includes("pioneer")) return "pioneerSelect";
  if(g.includes("other")) return "otherSelect";
  if(g.includes("spare")) return "spareSelect";

  return "";
}

 data.results
  .filter(item => {
  const active =
    item.field_8476262?.value ||
    item.field_8476262?.[0]?.value ||
    item.field_8476262 ||
    "";

  return active === "Present";
})
  .forEach(item => {

   const group =
  item.field_8476260?.value ||
  item.field_8476260?.[0]?.value ||
  item.field_8476260 ||
  "";

const title =
  item.field_8476261?.value ||
  item.field_8476261 ||
  "";

const url =
  item.field_8476315?.url ||
  item.field_8476315?.value ||
  item.field_8476315 ||
  "";

      const selectId = getFacebookSelectId(group);

      if(!selectId || !title || !url) return;

      const select = document.getElementById(selectId);

      const option = document.createElement("option");

      option.value = url;
      option.textContent = title;

      select.appendChild(option);

    });

  ["classicSelect", "buySellSelect", "alpineSelect", "pioneerSelect", "otherSelect", "spareSelect"].forEach(selectId => {


    const select = document.getElementById(selectId);

    select.addEventListener("change", e => {

      if(e.target.value){
        window.location.href = e.target.value;
      }

    });

  });

}

loadBrandGuides();
loadFacebookLinks();

</script>
