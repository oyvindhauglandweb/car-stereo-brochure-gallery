<script>
async function fetchCurrentUser(){
  try{
    const res = await fetch(`${API_BASE}/whoami`, {
      credentials:"include"
    });

    if(!res.ok){
      return null;
    }

    return await res.json();
  }catch(error){
    return null;
  }
}

function getInitials(nameOrEmail){
  const value = String(nameOrEmail || "").trim();

  if(!value){
    return "?";
  }

  const namePart = value.includes("@")
    ? value.split("@")[0]
    : value;

  const parts = namePart
    .split(/\s+/)
    .filter(Boolean);

  if(parts.length >= 2){
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  return namePart.slice(0, 2).toUpperCase();
}
  
async function applyLoginVisibility(){
  const currentUser = await fetchCurrentUser();
  const addButton = document.getElementById("addBrochureButton");
  const loginStatus = document.getElementById("loginStatus");
  const loginMenu = document.getElementById("loginMenu");
  const loginMenuName = document.getElementById("loginMenuName");
  const logoutLink = document.getElementById("logoutLink");

  async function performLogout(){
    try{
      await fetch("https://api.carstereogarage.com/cdn-cgi/access/logout", {
        method:"GET",
        credentials:"include",
        mode:"no-cors"
      });
    }catch(error){
      console.warn("Logout request may have been blocked, continuing anyway.", error);
    }

    window.location.href = "index.html?logout=" + Date.now();
  }

  const isMobile =
    window.matchMedia("(max-width: 800px)").matches;

  if(currentUser){
    const displayName =
      currentUser.name || currentUser.email || "Signed in";

    if(addButton){
      addButton.style.display = "flex";
    }

    loginStatus.textContent = isMobile
      ? getInitials(displayName)
      : `${displayName} · Sign out`;

    loginStatus.classList.add("signed-in");
    loginStatus.classList.remove("is-signin");

    loginStatus.title = isMobile
      ? displayName
      : "Sign out";

    if(loginMenuName){
      loginMenuName.textContent = displayName;
    }

    if(logoutLink){
      logoutLink.href = "#";
      logoutLink.removeAttribute("target");
      logoutLink.onclick = function(event){
        event.preventDefault();
        performLogout();
      };
    }

    if(isMobile){
      loginStatus.href = "#";
      loginStatus.removeAttribute("target");

      loginStatus.onclick = function(event){
        event.preventDefault();

        if(loginMenu){
          loginMenu.style.display =
            loginMenu.style.display === "block" ? "none" : "block";
        }
      };
    }else{
      loginStatus.href = "#";
      loginStatus.removeAttribute("target");

      loginStatus.onclick = function(event){
        event.preventDefault();
        performLogout();
      };

      if(loginMenu){
        loginMenu.style.display = "none";
      }
    }
  }else{
    if(addButton){
      addButton.style.display = "none";
    }

    loginStatus.textContent = "Sign in";

    loginStatus.href =
      `${API_BASE}/login?returnUrl=${encodeURIComponent(window.location.href)}`;

    loginStatus.removeAttribute("target");
    loginStatus.classList.remove("signed-in");
    loginStatus.classList.add("is-signin");
    loginStatus.title = "Sign in";
    loginStatus.onclick = null;

    if(loginMenu){
      loginMenu.style.display = "none";
    }
  }
}  
function applySavedTheme(){
  const savedTheme =
    localStorage.getItem("brochureTheme") || "dark";

  if(savedTheme === "dark"){
    document.body.classList.add("dark-mode");
  } else {
    document.body.classList.remove("dark-mode");
  }
}

applySavedTheme();
  
const API_BASE = "https://api.carstereogarage.com";

let portalOptionsData = null;

async function loadPortalOptions(){
  if(portalOptionsData){
    return portalOptionsData;
  }

  const res = await fetch(`${API_BASE}/portal-options`);

  if(!res.ok){
    throw new Error("Could not load portal options");
  }

  portalOptionsData = await res.json();
  return portalOptionsData;
}
  
async function loadBrandGuides(){

 const data = await loadPortalOptions();
data.results = data.brands || [];

  const select = document.getElementById("brandGuideSelect");

  data.results
    .filter(item => item.field_8476152?.value === "Present")
    .forEach(item => {

      const brand =
        item.field_8351135 || "";

      const url =
        item.field_8445075 || "";

      if(!brand || !url) return;

      const option = document.createElement("option");

      option.value = url;
      option.textContent = brand;

      select.appendChild(option);

    });

  select.addEventListener("change", e => {

if(e.target.value){

  const brand =
    encodeURIComponent(
      e.target.options[e.target.selectedIndex].text
    );

  window.location.href =
    `model-series.html?brand=${brand}`;
}

  });

}

async function loadFacebookLinks(){

 const data = await loadPortalOptions();
data.results = data.facebookLinks || [];

function getFacebookSelectId(group){
  const g = String(group || "").toLowerCase();

  if(g.includes("classic")) return "classicSelect";
  if(g.includes("buy")) return "buySellSelect";
  if(g.includes("sell")) return "buySellSelect";
  if(g.includes("alpine")) return "alpineSelect";
  if(g.includes("pioneer")) return "pioneerSelect";
  if(g.includes("other")) return "otherSelect";
  if(g.includes("spare")) return "spareSelect";

  return "";
}

 data.results
  .filter(item => {
  const active =
    item.field_8476262?.value ||
    item.field_8476262?.[0]?.value ||
    item.field_8476262 ||
    "";

  return active === "Present";
})
  .forEach(item => {

   const group =
  item.field_8476260?.value ||
  item.field_8476260?.[0]?.value ||
  item.field_8476260 ||
  "";

const title =
  item.field_8476261?.value ||
  item.field_8476261 ||
  "";

const url =
  item.field_8476315?.url ||
  item.field_8476315?.value ||
  item.field_8476315 ||
  "";

      const selectId = getFacebookSelectId(group);

      if(!selectId || !title || !url) return;

      const select = document.getElementById(selectId);

      const option = document.createElement("option");

      option.value = url;
      option.textContent = title;

      select.appendChild(option);

    });

  ["classicSelect", "buySellSelect", "alpineSelect", "pioneerSelect", "otherSelect", "spareSelect"].forEach(selectId => {


    const select = document.getElementById(selectId);

    select.addEventListener("change", e => {

      if(e.target.value){
        window.location.href = e.target.value;
      }

    });

  });

}
const adminSection =
  document.getElementById("adminSection");

const adminHotspot =
  document.getElementById("adminHotspot");

function applyAdminVisibility(){

  const adminVisible =
    localStorage.getItem("adminVisible") === "true";

  adminSection.style.display =
    adminVisible ? "block" : "none";
}

adminHotspot.addEventListener("click", () => {

  const current =
    localStorage.getItem("adminVisible") === "true";

  localStorage.setItem(
    "adminVisible",
    (!current).toString()
  );

  document.addEventListener("click", function(event){
  const widget = document.querySelector(".login-widget");
  const menu = document.getElementById("loginMenu");

  if(widget && menu && !widget.contains(event.target)){
    menu.style.display = "none";
  }
});

});

applyAdminVisibility();
applyLoginVisibility();
loadBrandGuides().catch(error => {
  console.error(error);
});

loadFacebookLinks().catch(error => {
  console.error(error);
});
