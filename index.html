.admin-grid{

.guide-row{

.guide-select{

.facebook-grid{

#adminHotspot{

<script>
  
function applySavedTheme(){
  const savedTheme = localStorage.getItem("brochureTheme") || "dark";
  const logo = document.getElementById("siteLogo");

  if(savedTheme === "dark"){
    document.body.classList.add("dark-mode");
    logo.src = "CarStereoBrochures2 Sort BG.png";
  } else {
    document.body.classList.remove("dark-mode");
    logo.src = "CarStereoBrochures2.png";
  }
}

applySavedTheme();
  
const BASEROW_TOKEN = "0d9HltmXB6ehmXHOBCrKYDYckO65DKKK";

async function loadBrandGuides(){

  const TABLE_ID = "957417";

  const res = await fetch(
    `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=false&size=200`,
    {
      headers:{
        Authorization:`Token ${BASEROW_TOKEN}`
      }
    }
  );

  const data = await res.json();

  const select = document.getElementById("brandGuideSelect");

  data.results
    .filter(item => item.field_8476152?.value === "Present")
    .forEach(item => {

      const brand =
        item.field_8351135 || "";

      const url =
        item.field_8445075 || "";

      if(!brand || !url) return;

      const option = document.createElement("option");

      option.value = url;
      option.textContent = brand;

      select.appendChild(option);

    });

  select.addEventListener("change", e => {

if(e.target.value){

  const brand =
    encodeURIComponent(
      e.target.options[e.target.selectedIndex].text
    );

  window.location.href =
    `model-series.html?brand=${brand}`;
}

  });

}

async function loadFacebookLinks(){

  const TABLE_ID = "969808";

  const res = await fetch(
    `https://api.baserow.io/api/database/rows/table/${TABLE_ID}/?user_field_names=false&size=200`,
    {
      headers:{
        Authorization:`Token ${BASEROW_TOKEN}`
      }
    }
  );

  const data = await res.json();

function getFacebookSelectId(group){
  const g = String(group || "").toLowerCase();

  if(g.includes("classic")) return "classicSelect";
  if(g.includes("buy")) return "buySellSelect";
  if(g.includes("sell")) return "buySellSelect";
  if(g.includes("alpine")) return "alpineSelect";
  if(g.includes("pioneer")) return "pioneerSelect";
  if(g.includes("other")) return "otherSelect";
  if(g.includes("spare")) return "spareSelect";

  return "";
}

 data.results
  .filter(item => {
  const active =
    item.field_8476262?.value ||
    item.field_8476262?.[0]?.value ||
    item.field_8476262 ||
    "";

  return active === "Present";
})
  .forEach(item => {

   const group =
  item.field_8476260?.value ||
  item.field_8476260?.[0]?.value ||
  item.field_8476260 ||
  "";

const title =
  item.field_8476261?.value ||
  item.field_8476261 ||
  "";

const url =
  item.field_8476315?.url ||
  item.field_8476315?.value ||
  item.field_8476315 ||
  "";

      const selectId = getFacebookSelectId(group);

      if(!selectId || !title || !url) return;

      const select = document.getElementById(selectId);

      const option = document.createElement("option");

      option.value = url;
      option.textContent = title;

      select.appendChild(option);

    });

  ["classicSelect", "buySellSelect", "alpineSelect", "pioneerSelect", "otherSelect", "spareSelect"].forEach(selectId => {


    const select = document.getElementById(selectId);

    select.addEventListener("change", e => {

      if(e.target.value){
        window.location.href = e.target.value;
      }

    });

  });

}
const adminSection =
  document.getElementById("adminSection");

const adminHotspot =
  document.getElementById("adminHotspot");

function applyAdminVisibility(){

  const adminVisible =
    localStorage.getItem("adminVisible") === "true";

  adminSection.style.display =
    adminVisible ? "block" : "none";
}

adminHotspot.addEventListener("click", () => {

  const current =
    localStorage.getItem("adminVisible") === "true";

  localStorage.setItem(
    "adminVisible",
    (!current).toString()
  );

  applyAdminVisibility();

});

applyAdminVisibility();
loadBrandGuides();
loadFacebookLinks();

</script>
