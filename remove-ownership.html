<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Ownership - Car Stereo Brochures</title>

<style>
:root{
  --bg:#f2f2f2;
  --card:#ffffff;
  --text:#333333;
  --muted:#777777;
  --border:#cccccc;
  --soft:#eaeaea;
  --link:#1f789d;
  --button:#ffffff;
  --button-hover:#e9eef2;
}
body.dark-mode{
  --bg:#151515;
  --card:#242424;
  --text:#eeeeee;
  --muted:#bbbbbb;
  --border:#555555;
  --soft:#333333;
  --link:#7cc7e8;
  --button:#242424;
  --button-hover:#3a3a3a;
}
body{margin:0;padding:20px;background:var(--bg);font-family:Arial,sans-serif;color:var(--text)}
.container{max-width:850px;margin:auto}
.header{text-align:center;margin-bottom:34px}
.logo{
  height:48px;
  width:auto;
}
.top-buttons{display:flex;justify-content:center;gap:10px;margin-top:18px}
.top-button{display:flex;align-items:center;justify-content:center;width:44px;min-width:44px;height:44px;padding:0;background:var(--button);color:var(--text);text-decoration:none;border:1px solid var(--border);border-radius:8px;font-size:26px;font-weight:900;font-family:Arial,sans-serif;line-height:44px;box-sizing:border-box;cursor:pointer}
.top-button:hover{background:var(--button-hover)}
.icon-back{position:relative;top:-1px;font-size:28px}
.icon-home{position:relative;top:-2px;font-size:30px}
.theme-icon{font-size:22px;font-weight:700}
.page-title{text-align:center;margin-bottom:10px;font-size:28px;font-weight:bold}
.intro{text-align:center;color:var(--muted);line-height:1.5;margin:0 auto 32px;max-width:700px}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;box-sizing:border-box}
.claim-brochure-preview{display:grid;grid-template-columns:180px 1fr;gap:18px;align-items:stretch}
.claim-brochure-image{width:180px;height:240px;object-fit:contain;background:var(--soft);border-radius:8px}
.claim-brochure-title{display:flex;align-items:center;padding:18px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-weight:bold}
.action-row{display:flex;gap:12px;align-items:center;justify-content:flex-end;margin-top:24px;flex-wrap:wrap}
.remove-button,.secondary-button{display:flex;align-items:center;justify-content:center;min-width:160px;height:44px;padding:0 18px;background:var(--button);border:1px solid var(--border);color:var(--text);border-radius:8px;text-decoration:none;font-size:16px;font-weight:bold;font-family:Arial,sans-serif;cursor:pointer;box-sizing:border-box}
.remove-button{background:#9b3c3c;color:#ffffff;border:none}
.remove-button:hover{background:#7d2f2f}
.secondary-button:hover{background:var(--button-hover)}
.status-box{display:none;margin-top:20px;padding:14px 16px;border-radius:8px;border:1px solid var(--border);background:var(--soft);line-height:1.5}
.status-box.success{display:block;border-color:#4f8f5f}
.status-box.error{display:block;border-color:#b85c5c}
@media(max-width:800px){
  body{padding:14px}
  .claim-brochure-preview{grid-template-columns:1fr}
  .claim-brochure-image{width:100%;height:auto;max-height:320px}
  .action-row{justify-content:stretch}
  .remove-button,.secondary-button{width:100%}
}
</style>

<script data-goatcounter="https://oyvindhaugland.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<body>
<div class="container">
  <div class="header">
    <img class="logo" id="siteLogo" src="Car Stereo Garage2_3.png" alt="Car Stereo Brochures">
    <div class="top-buttons">
      <a class="top-button" href="gallery.html" title="Back"><span class="icon-back">←</span></a>
      <a class="top-button" href="index.html" title="Home"><span class="icon-home">⌂</span></a>
      <button type="button" class="top-button" onclick="toggleTheme()" id="themeToggle" title="Toggle light/dark mode"><span class="theme-icon">◐</span></button>
    </div>
  </div>

  <div class="page-title">Remove Ownership</div>
  <div class="intro">Confirm that you want to remove this registered ownership.</div>

  <div class="form-card">
    <div id="selectedBrochureDisplay" class="claim-brochure-preview">Loading brochure...</div>

    <div class="action-row">
      <a class="secondary-button" id="cancelButton" href="gallery.html">Cancel</a>
      <button class="remove-button" id="removeButton" type="button">Remove ownership</button>
    </div>

    <div id="statusBox" class="status-box"></div>
  </div>
</div>

<script>
const API_BASE = "https://api.carstereogarage.com";
const TABLES = { brochures: "959905" };

let brochure = null;
let ownerId = null;
let ownerName = "";

function applySavedTheme(){
  const savedTheme = localStorage.getItem("brochureTheme") || "dark";
  const logo = document.getElementById("siteLogo");
  if(savedTheme === "dark"){
    document.body.classList.add("dark-mode");
    logo.src = "Car Stereo Garage2_3.png";
  } else {
    document.body.classList.remove("dark-mode");
    logo.src = "Car Stereo Garage2_3.png";
  }
}

function toggleTheme(){
  const isDark = document.body.classList.toggle("dark-mode");
  if(isDark){
    localStorage.setItem("brochureTheme", "dark");
    document.getElementById("siteLogo").src = "Car Stereo Garage2_3.png";
  } else {
    localStorage.setItem("brochureTheme", "light");
    document.getElementById("siteLogo").src = "Car Stereo Garage2_3.png";
  }
}

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, function(char){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char];
  });
}

function getLinkedNames(value){
  if(!value) return "";
  if(Array.isArray(value)){
    return value
      .map(item => item.value || item.name || "")
      .filter(Boolean)
      .sort((a,b) => a.localeCompare(b))
      .join(", ");
  }
  if(typeof value === "object"){
    return value.value || value.name || "";
  }
  return String(value);
}

function getFileUrl(value){
  if(!value) return "";
  if(Array.isArray(value)){
    return value[0]?.url || value[0]?.thumbnails?.card_cover?.url || value[0]?.thumbnails?.small?.url || "";
  }
  if(typeof value === "object"){
    return value.url || "";
  }
  return "";
}

function getBrochureLabel(row){
  const brand = getLinkedNames(row.field_8379585);
  const year = row.field_8379588 || "";
  const title = row.field_8379608 || "";
  const language = getLinkedNames(row.field_8379590);
  return [brand, year, title, language].filter(Boolean).join(" - ");
}

function showStatus(message, type){
  const box = document.getElementById("statusBox");
  box.className = "status-box " + type;
  box.innerHTML = message;
}

async function fetchAllRows(tableId){
  const res = await fetch(`${API_BASE}/rows?table=${tableId}&user_field_names=false`);
  if(!res.ok){
    throw new Error("Could not load table " + tableId);
  }
  const data = await res.json();
  return data.results || [];
}

async function removeOwnership(payload){
  const res = await fetch(`${API_BASE}/remove-ownership`, {
    method:"POST",
    credentials:"include",
    headers:{
      "Content-Type":"text/plain"
    },
    body:JSON.stringify(payload)
  });

  if(!res.ok){
    const text = await res.text();
    throw new Error(text);
  }

  return await res.json();
}

function renderBrochure(ownerNames){
  const imageUrl = getFileUrl(brochure.field_8379592);
  document.getElementById("selectedBrochureDisplay").innerHTML = `
    ${
      imageUrl
        ? `<img class="claim-brochure-image" src="${esc(imageUrl)}" alt="${esc(getBrochureLabel(brochure))}">`
        : ``
    }

    <div class="claim-brochure-title">
      <div>
        <div style="font-weight:bold;margin-bottom:14px;">
          ${esc(getBrochureLabel(brochure))}
        </div>

        <div style="color:var(--muted);line-height:1.5;font-size:15px;">
          <strong>Registered owners:</strong><br>
          ${esc(ownerNames)}
        </div>

        <div style="color:var(--muted);line-height:1.5;font-size:15px;margin-top:14px;">
          <strong>Remove owner:</strong><br>
          ${esc(ownerName)}
        </div>
      </div>
    </div>
  `;
}

async function loadPage(){
  applySavedTheme();

  const params = new URLSearchParams(window.location.search);
  const brochureId = Number(params.get("brochure_id"));
  ownerId = Number(params.get("owner_id"));
  ownerName = params.get("owner_name") || "";
  const returnUrl = params.get("returnUrl") || "gallery.html";

  document.getElementById("cancelButton").href = returnUrl;

  const brochures = await fetchAllRows(TABLES.brochures);
  brochure = brochures.find(row => Number(row.id) === brochureId);

  if(!brochure){
    showStatus("Could not find brochure.", "error");
    return;
  }

  renderBrochure(getLinkedNames(brochure.field_8379595));

  document.getElementById("removeButton").addEventListener("click", async () => {
    try{
      const ownerIds = (brochure.field_8379595 || [])
        .map(item => Number(item.id))
        .filter(id => id !== ownerId);

      await removeOwnership({
        brochure_id: brochureId,
        owner_ids: ownerIds
      });

      const updatedOwnerNames = getLinkedNames(
        (brochure.field_8379595 || [])
          .filter(item => Number(item.id) !== ownerId)
      );

       renderBrochure(updatedOwnerNames);

      showStatus(
        `<strong>Ownership removed successfully.</strong><br><br>
         <a href="${esc(returnUrl)}" style="color:var(--link);font-weight:bold;">Return to gallery</a>`,
        "success"
      );

      const removeButton = document.getElementById("removeButton");
      removeButton.textContent = "Close";
      removeButton.classList.remove("remove-button");
      removeButton.classList.add("secondary-button");
      removeButton.onclick = function(){
        window.location.href = returnUrl;
      };

    } catch(error){
      console.error(error);
      showStatus(error.message, "error");
    }
  });
}

loadPage().catch(error => {
  console.error(error);
  showStatus(error.message, "error");
});
</script>
</body>
</html>
